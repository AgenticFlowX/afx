<!-- @see docs/specs/landing-page/spec.md -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name — Personal Landing Page</title>
  <style>
    /* @see docs/specs/landing-page/spec.md [NFR-3] — No external dependencies */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #1a1a2e;
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    main {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    /* @see docs/specs/landing-page/spec.md [FR-1] — Hero Section */
    .hero {
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .hero p {
      font-size: 1.125rem;
      color: #555;
    }

    /* @see docs/specs/landing-page/spec.md [FR-2] — About Section */
    .about {
      margin-bottom: 2rem;
    }

    .about p {
      font-size: 1rem;
      color: #333;
      max-width: 480px;
      margin: 0 auto;
    }

    /* @see docs/specs/landing-page/spec.md [FR-3] — Social Links */
    .social-links {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
    }

    .social-links a {
      color: #0066cc;
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid #0066cc;
      border-radius: 4px;
      transition: background-color 0.2s, color 0.2s;
    }

    .social-links a:hover,
    .social-links a:focus {
      background-color: #0066cc;
      color: #fff;
      outline: 2px solid #0066cc;
      outline-offset: 2px;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.875rem;
      color: #888;
    }

    /* @see docs/specs/landing-page/spec.md [FR-4] — Responsive Layout */
    @media (max-width: 480px) {
      .hero h1 {
        font-size: 1.75rem;
      }

      .social-links {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <!-- @see docs/specs/landing-page/spec.md [FR-5] — Semantic HTML -->
  <main>
    <!-- @see docs/specs/landing-page/spec.md [FR-1] -->
    <header class="hero">
      <h1>Your Name</h1>
      <p>Developer / Designer / Creator</p>
    </header>

    <!-- @see docs/specs/landing-page/spec.md [FR-2] -->
    <section class="about" aria-label="About me">
      <p>
        Hello! I'm a developer who builds things for the web. I care about
        clean code, accessible design, and shipping software that makes a
        difference. Welcome to my corner of the internet.
      </p>
    </section>

    <!-- @see docs/specs/landing-page/spec.md [FR-3] -->
    <nav aria-label="Social links">
      <ul class="social-links">
        <li><a href="https://github.com/yourusername">GitHub</a></li>
        <li><a href="https://linkedin.com/in/yourusername">LinkedIn</a></li>
        <li><a href="mailto:you@example.com">Email</a></li>
      </ul>
    </nav>

    <footer>
      <p>Built with AgenticFlowX</p>
    </footer>
  </main>
</body>
</html>
