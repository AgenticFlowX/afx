# AFX version — controls which branch/tag afx-cli fetches from.
# Accepts: semver (e.g. '1.5.3' → tag v1.5.3), branch name, or 'main'.
version: main

# ── Agent Selection ────────────────────────────────────────────────────
# Which AI agents are enabled. Managed by afx-cli during install/update.
