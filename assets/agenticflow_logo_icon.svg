<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>

    <!-- Golden accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#0f172a"/>

  <!-- Main icon mark - infinity flow with integrated nodes -->
  <g id="iconMark" transform="translate(400, 300)">
    
    <!-- The continuous flow path (figure-8/möbius inspired) -->
    <path d="M -140 0 
             C -140 -80, -70 -80, -70 0
             C -70 80, 0 80, 0 0
             C 0 -80, 70 -80, 70 0
             C 70 80, 140 80, 140 0"
          stroke="url(#primaryGrad)"
          stroke-width="8"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#iconGlow)"
          opacity="0.9"/>

    <!-- Golden thread overlay showing the connection -->
    <path d="M -140 0 Q -105 -40, -70 0 Q -35 40, 0 0 Q 35 -40, 70 0 Q 105 40, 140 0"
          stroke="url(#goldGrad)"
          stroke-width="3"
          fill="none"
          stroke-linecap="round"
          opacity="0.8"/>

    <!-- Three key nodes -->
    <!-- Spec -->
    <g transform="translate(-140, 0)">
      <circle r="20" fill="url(#primaryGrad)" opacity="0.9"/>
      <circle r="14" fill="#0f172a"/>
      <circle r="6" fill="url(#goldGrad)"/>
    </g>
    
    <!-- Code -->
    <g transform="translate(0, 0)">
      <circle r="24" fill="url(#primaryGrad)" opacity="0.9"/>
      <circle r="18" fill="#0f172a"/>
      <circle r="8" fill="url(#goldGrad)"/>
    </g>
    
    <!-- Execution -->
    <g transform="translate(140, 0)">
      <circle r="20" fill="url(#primaryGrad)" opacity="0.9"/>
      <circle r="14" fill="#0f172a"/>
      <circle r="6" fill="url(#goldGrad)"/>
    </g>

    <!-- Human-AI collaboration indicators (subtle orbits) -->
    <circle r="180" stroke="url(#primaryGrad)" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="4,8"/>
    <circle r="200" stroke="url(#primaryGrad)" stroke-width="1" fill="none" opacity="0.15" stroke-dasharray="4,12"/>
  </g>

  <!-- Typography -->
  <g id="branding">
    <!-- Main AFX -->
    <text x="400" y="520" 
          font-family="'SF Mono', 'Monaco', monospace" 
          font-size="72" 
          fill="#e2e8f0" 
          text-anchor="middle" 
          font-weight="700"
          letter-spacing="8">AFX</text>
    
    <!-- Full name -->
    <text x="400" y="560" 
          font-family="'Inter', 'Helvetica', sans-serif" 
          font-size="18" 
          fill="#94a3b8" 
          text-anchor="middle" 
          letter-spacing="6"
          font-weight="300">AGENTICFLOW</text>
    
    <!-- Tagline -->
    <text x="400" y="600"
          font-family="'Inter', 'Helvetica', sans-serif"
          font-size="14"
          fill="#64748b"
          text-anchor="middle"
          letter-spacing="1"
          font-style="italic">Session continuity for AI-assisted development</text>
  </g>

  <!-- Decorative code elements -->
  <g opacity="0.25" fill="none" stroke="#3b82f6" stroke-width="2">
    <!-- Left bracket -->
    <path d="M 150 250 L 130 250 L 130 350 L 150 350"/>
    <!-- Right bracket -->
    <path d="M 650 250 L 670 250 L 670 350 L 650 350"/>
  </g>

  <!-- Subtle grid suggestion (living documentation) -->
  <g opacity="0.08" stroke="#475569" stroke-width="1">
    <line x1="200" y1="200" x2="600" y2="200"/>
    <line x1="200" y1="400" x2="600" y2="400"/>
    <line x1="200" y1="200" x2="200" y2="400"/>
    <line x1="600" y1="200" x2="600" y2="400"/>
  </g>
</svg>
